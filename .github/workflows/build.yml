name: 纪念日 Android 自动编译打包

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:  # 支持手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      # ---------- 1. 检出代码 ----------
      - name: 📥 检出代码
        uses: actions/checkout@v5

      # ---------- 2. 设置 Java JDK 17 ----------
      - name: ☕ 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # ---------- 3. 设置 Android SDK ----------
      - name: 🤖 设置 Android SDK
        uses: android-actions/setup-android@v3
        id: setup-android
        with:
          cmdline-tools-version: 11076708  # latest stable

      # ---------- 4. 授予 gradlew 执行权限 ----------
      - name: 🔑 授予 gradlew 执行权限
        run: chmod +x ./gradlew

      # ---------- 5. 缓存 Gradle ----------
      - name: 💾 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------- 6. 编译 Debug APK ----------
      - name: 🔨 编译 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ---------- 7. 定位 APK ----------
      - name: 🔍 查找 APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK_PATH=$APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      # ---------- 8. 上传 APK 为构建产物 ----------
      - name: 📤 上传 APK 产物
        uses: actions/upload-artifact@v5
        with:
          name: MemorialDayApp-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error

      # ---------- 9. 上传 Build 报告（调试用） ----------
      - name: 📤 上传编译报告
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/outputs/
          if-no-files-found: ignore
